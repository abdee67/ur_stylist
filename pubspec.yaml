name: ur_stylist
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.8.1 <4.0.0'
dependencies:
  app_links: ^6.4.0
  flutter:
    sdk: flutter
  supabase_flutter: ^2.9.1
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^9.2.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  iconsax: ^0.0.8
  go_router: ^16.0.0
  dartz: ^0.10.1
  lottie: ^3.3.1
  flutter_onboarding: ^1.0.6
  flutter_animate: ^4.5.2
  flutter_onboarding_slider: ^1.0.11
  animated_text_kit: ^4.2.3
  otp_text_field: ^1.1.3
  flutter_dotenv: ^5.2.1
  carousel_slider: ^5.1.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  location: ^8.0.1
  http: ^1.6.0
  flutter_stripe: ^12.6.0
  image_picker: ^1.1.2
  file_picker: ^10.2.0
  flutter_image_compress: ^2.4.0
  pin_code_fields: ^8.0.1
  path: ^1.9.1
  url_launcher: ^6.3.1
  mobile_scanner: ^7.2.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:

  uses-material-design: true
  assets:
    - assets/images/image1.png
    - assets/images/image2.png
    - assets/images/welcome.png
    - assets/images/wave.png
    - assets/images/floral.png
    - assets/images/logo.png
    - assets/images/onboarding.png
    - assets/images/onboarding1.png
    - assets/images/onboarding2.png
    - assets/images/onboarding3.png
    - assets/images/onboarding4.png
    - assets/images/onboarding3.jpeg
    - assets/.env
  fonts:
    - family: BitcountPropSingle
      fonts:
        - asset: assets/fonts/BitcountPropSingle-Medium.ttf
